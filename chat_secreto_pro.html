```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🔐 Chat Secreto</title>

<style>

body{
margin:0;
font-family:Arial;
background:#e5ddd5;
display:flex;
flex-direction:column;
height:100vh;
}

.header{
background:#075e54;
color:white;
padding:15px;
font-weight:bold;
}

.chat{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:70%;
padding:10px;
border-radius:10px;
}

.user{
align-self:flex-end;
background:#dcf8c6;
}

.remote{
align-self:flex-start;
background:white;
}

.inputArea{
display:flex;
gap:10px;
padding:10px;
background:#f0f0f0;
}

input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

button{
background:#25d366;
border:none;
color:white;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
🔐 Chat Secreto Online
</div>

<div class="chat" id="chat"></div>

<div class="inputArea">
<input id="texto" placeholder="Escribe un mensaje">
<button onclick="enviar()">Enviar</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "TU_API_KEY",
authDomain: "TU_PROYECTO.firebaseapp.com",
projectId: "TU_PROYECTO",

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let sala = new URLSearchParams(location.search).get("sala");

if(!sala){

sala = Math.random().toString(36).substring(2,8);

location.search = "?sala="+sala;

}

const mensajes = collection(db,"salas",sala,"mensajes");

function agregarMsg(texto,clase){

let div=document.createElement("div");

div.className="msg "+clase;

div.innerText=texto;

document.getElementById("chat").appendChild(div);

document.getElementById("chat").scrollTop=999999;

}

window.enviar = async function(){

let input=document.getElementById("texto");

let msg=input.value.trim();

if(msg==="")return;

await addDoc(mensajes,{
texto:msg,
fecha:Date.now()
});

input.value="";

}

const q = query(mensajes, orderBy("fecha"));

onSnapshot(q,(snap)=>{

document.getElementById("chat").innerHTML="";

snap.forEach(doc=>{

agregarMsg(doc.data().texto,"remote");

});

});

</script>

</body>
</html>
