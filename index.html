
<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat Secreto</title>

<style>

body{
margin:0;
font-family:Arial;
background:#e5ddd5;
display:flex;
flex-direction:column;
height:100vh;
}

.header{
background:#075e54;
color:white;
padding:15px;
font-weight:bold;
}

.chat{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:70%;
padding:10px;
border-radius:10px;
}

.user{
align-self:flex-end;
background:#dcf8c6;
}

.remote{
align-self:flex-start;
background:white;
}

.inputArea{
display:flex;
gap:10px;
padding:10px;
background:#f0f0f0;
}

input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

button{
background:#25d366;
border:none;
color:white;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
🔐 Chat Secreto
</div>

<div id="chat" class="chat"></div>

<div class="inputArea">
<input id="texto" placeholder="Escribe un mensaje">
<button onclick="enviar()">Enviar</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* CONFIGURACION DE FIREBASE */

const firebaseConfig = {
  apiKey: "AIzaSyC_1zQU3X8K3v4Es2mfJaOmKq0BahCYQsE",
  authDomain: "chat-secreto-7a888.firebaseapp.com",
  projectId: "chat-secreto-7a888",
  storageBucket: "chat-secreto-7a888.firebasestorage.app",
  messagingSenderId: "422501151882",
  appId: "1:422501151882:web:63b46bc07867b173982973"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const mensajes = collection(db,"mensajes");

/* CIFRADO A=1 B=2 */

function cifrar(texto){

texto = texto.toUpperCase();

let resultado=[];

for(let i=0;i<texto.length;i++){

let c=texto.charCodeAt(i);

if(c>=65 && c<=90){
resultado.push(c-64);
}

}

return resultado.join("-");

}

/* AGREGAR MENSAJE EN PANTALLA */

function agregarMsg(texto){

let div=document.createElement("div");

div.className="msg remote";

div.innerText=texto;

document.getElementById("chat").appendChild(div);

document.getElementById("chat").scrollTop=999999;

}

/* ENVIAR MENSAJE */

window.enviar = async function(){

let input=document.getElementById("texto");

let msg=input.value.trim();

if(msg==="")return;

let cifrado=cifrar(msg);

await addDoc(mensajes,{
texto:cifrado,
fecha:Date.now()
});

input.value="";

}

/* ESCUCHAR MENSAJES EN TIEMPO REAL */

const q = query(mensajes, orderBy("fecha"));

onSnapshot(q,(snap)=>{

document.getElementById("chat").innerHTML="";

snap.forEach(doc=>{

agregarMsg(doc.data().texto);

});

});

</script>

</body>
</html>
