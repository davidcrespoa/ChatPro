<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Espía PRO</title>

<style>
body { margin: 0; font-family: Arial; background: #e5ddd5; display: flex; flex-direction: column; height: 100vh; }
.header { background: #075e54; color: white; padding: 15px; text-align: center; }
.chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }

.msg { max-width: 75%; padding: 8px 12px; border-radius: 10px; font-family: monospace; }

.remote { align-self: flex-start; background: white; }
.me { align-self: flex-end; background: #dcf8c6; }

.btn-descifrar { font-size: 10px; margin-left: 5px; cursor: pointer; }

.inputArea { display: flex; gap: 10px; padding: 10px; background: #f0f0f0; }
input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; }
button { background: #25d366; border: none; color: white; padding: 10px 20px; border-radius: 20px; }
</style>
</head>

<body>

<div class="header">🔐 Chat Espía - Identidad Activa</div>
<div id="chat" class="chat"></div>

<div class="inputArea">
<input id="texto" placeholder="Escribe un secreto...">
<button onclick="enviar()">Enviar</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyC_1zQU3X8K3v4Es2mfJaOmKq0BahCYQsE",
authDomain: "chat-secreto-7a888.firebaseapp.com",
projectId: "chat-secreto-7a888",
storageBucket: "chat-secreto-7a888.firebasestorage.app",
messagingSenderId: "422501151882",
appId: "1:422501151882:web:63b46bc07867b173982973"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const mensajesCol = collection(db, "mensajes");

const MI_ID = Math.random().toString(36).substring(7);

// 🔐 CLAVE FIJA
let CLAVE = "1010";

//////////////////////////////////////////////////
// 🔐 AES
//////////////////////////////////////////////////

async function getKey() {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
        "raw",
        enc.encode(CLAVE),
        { name: "PBKDF2" },
        false,
        ["deriveKey"]
    );

    return crypto.subtle.deriveKey({
        name: "PBKDF2",
        salt: enc.encode("sal-pro"),
        iterations: 100000,
        hash: "SHA-256"
    }, keyMaterial, {
        name: "AES-GCM",
        length: 256
    }, false, ["encrypt", "decrypt"]);
}

async function cifrarSeguro(texto){
    const enc = new TextEncoder();
    const key = await getKey();
    const iv = crypto.getRandomValues(new Uint8Array(12));

    const cifrado = await crypto.subtle.encrypt(
        { name: "AES-GCM", iv },
        key,
        enc.encode(texto)
    );

    return JSON.stringify({
        iv: Array.from(iv),
        data: Array.from(new Uint8Array(cifrado))
    });
}

async function descifrarSeguro(dataStr){
    const dec = new TextDecoder();
    const key = await getKey();
    const data = JSON.parse(dataStr);

    const decrypted = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: new Uint8Array(data.iv) },
        key,
        new Uint8Array(data.data)
    );

    return dec.decode(decrypted);
}

//////////////////////////////////////////////////
// 🚀 ENVIAR
//////////////////////////////////////////////////

window.enviar = async function(){
    let input = document.getElementById("texto");
    let msg = input.value.trim();
    if(msg==="") return;

    let cifrado = await cifrarSeguro(msg);

    await addDoc(mensajesCol,{
        texto: cifrado,
        sender: MI_ID,
        fecha: Date.now()
    });

    input.value="";
}

//////////////////////////////////////////////////
// 🔓 DESCIFRAR (AUTO DETECTA)
//////////////////////////////////////////////////

window.descifrar = async function(btn, codigo){
    try{

        if(codigo.startsWith("{")){
            let texto = await descifrarSeguro(codigo);
            btn.parentElement.innerHTML = "🔓 " + texto;

        }else{
            let letras = codigo.split('-').map(n=>{
                let num=parseInt(n);
                return isNaN(num)?n:String.fromCharCode(num+64);
            }).join('');

            btn.parentElement.innerHTML = "🔓 " + letras;
        }

    }catch(e){
        console.error(e);
        btn.parentElement.innerHTML = "❌ Error al descifrar";
    }
}

//////////////////////////////////////////////////
// 📡 LISTENER
//////////////////////////////////////////////////

const q=query(mensajesCol,orderBy("fecha"));

onSnapshot(q,(snap)=>{
    let chat=document.getElementById("chat");

    snap.docChanges().forEach(change=>{
        if(change.type==="added"){

            let data=change.doc.data();

            let div=document.createElement("div");

            div.className="msg "+(data.sender===MI_ID?"me":"remote");

            div.innerHTML=`
            <span>Mensaje cifrado 🔐</span>
            <button class="btn-descifrar" onclick="descifrar(this,'${data.texto}')">
            Descifrar
            </button>`;

            chat.appendChild(div);
            chat.scrollTop=chat.scrollHeight;
        }
    });
});

</script>

</body>
</html>
