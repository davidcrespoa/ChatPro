<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Secreto PRO</title>
    <style>
        body { margin: 0; font-family: Arial; background: #e5ddd5; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #075e54; color: white; padding: 15px; font-weight: bold; text-align: center; }
        .chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 10px; position: relative; font-family: monospace; }
        .remote { align-self: flex-start; background: white; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .btn-descifrar { cursor: pointer; background: #eee; border: none; padding: 2px 5px; margin-left: 10px; font-size: 10px; border-radius: 4px; font-family: sans-serif; }
        .inputArea { display: flex; gap: 10px; padding: 10px; background: #f0f0f0; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        button#btnEnviar { background: #25d366; border: none; color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">🔐 Chat Espía - Descifrador Activo</div>
<div id="chat" class="chat"></div>

<div class="inputArea">
    <input id="texto" placeholder="Escribe tu secreto aquí...">
    <button id="btnEnviar" onclick="enviar()">Enviar</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC_1zQU3X8K3v4Es2mfJaOmKq0BahCYQsE",
        authDomain: "chat-secreto-7a888.firebaseapp.com",
        projectId: "chat-secreto-7a888",
        storageBucket: "chat-secreto-7a888.firebasestorage.app",
        messagingSenderId: "422501151882",
        appId: "1:422501151882:web:63b46bc07867b173982973"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const mensajesCol = collection(db, "mensajes");

    // Lógica de cifrado
    function cifrar(texto) {
        return texto.toUpperCase().split('').map(char => {
            let c = char.charCodeAt(0);
            return (c >= 65 && c <= 90) ? (c - 64) : char;
        }).join('-');
    }

    // Lógica de descifrado
    window.descifrar = function(elemento, codigo) {
        let letras = codigo.split('-').map(num => {
            let n = parseInt(num);
            return isNaN(n) ? num : String.fromCharCode(n + 64);
        }).join('');
        elemento.parentElement.innerText = "🔓 " + letras;
    }

    window.enviar = async function() {
        let input = document.getElementById("texto");
        let msg = input.value.trim();
        if (msg === "") return;
        await addDoc(mensajesCol, { texto: cifrar(msg), fecha: Date.now() });
        input.value = "";
    }

    const q = query(mensajesCol, orderBy("fecha"));
    onSnapshot(q, (snap) => {
        let chatDiv = document.getElementById("chat");
        chatDiv.innerHTML = "";
        snap.forEach(doc => {
            let data = doc.data();
            let div = document.createElement("div");
            div.className = "msg remote";
            div.innerHTML = `<span>${data.texto}</span> <button class="btn-descifrar" onclick="descifrar(this, '${data.texto}')">Descifrar</button>`;
            chatDiv.appendChild(div);
        });
        chatDiv.scrollTop = chatDiv.scrollHeight;
    });
</script>

</body>
</html>
